services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rag}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin123456}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c '
      until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}"; do
        echo "waiting for minio...";
        sleep 2;
      done;
      mc mb --ignore-existing local/"${MINIO_BUCKET:-rag-files}";
      '

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ./gateway/migrations:/workspace/migrations:ro
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    entrypoint: >-
      /bin/sh -c '
      until pg_isready -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"; do
        echo "waiting for postgres...";
        sleep 2;
      done;
      psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f /workspace/migrations/001_create_users.sql &&
      psql -h postgres -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}" -f /workspace/migrations/002_create_file_metadata.sql
      '

  ollama:
    image: ollama/ollama:0.6.7
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  ollama-pull:
    image: ollama/ollama:0.6.7
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-bge-m3}
    entrypoint: >-
      /bin/sh -c '
      until ollama list >/dev/null 2>&1; do
        echo "waiting for ollama...";
        sleep 2;
      done;
      ollama pull "$${OLLAMA_MODEL}"
      '

  gateway:
    build:
      context: ./gateway
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-rag}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-long-random-secret}
      JWT_EXPIRE_MINUTES: 120
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-rag-files}
      MINIO_USE_SSL: "false"
      PRESIGN_EXPIRE_MINUTES: 15
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123456}@rabbitmq:5672/
      RABBITMQ_QUEUE: document.upload
    ports:
      - "8080:8080"

  document-embedding:
    build:
      context: ./document-embedding
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_started
      ollama-pull:
        condition: service_completed_successfully
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASSWORD:-admin123456}@rabbitmq:5672/
      RABBITMQ_QUEUE: document.upload
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: documents
      EMBEDDING_API_URL: http://ollama:11434/api/embed
      EMBEDDING_API_KEY: ""
      EMBEDDING_MODEL: ${OLLAMA_MODEL:-bge-m3}
      EMBEDDING_DIM: 1024
      LOG_LEVEL: info

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  postgres-data:
  qdrant-data:
  minio-data:
  ollama-data:

